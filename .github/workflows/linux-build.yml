# .github/workflows/linux-build.yml
name: Linux Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev libxkbcommon-dev libx11-xcb-dev libxcb-glx0-dev wget

    - name: Install Qt
      id: install-qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        install-deps: 'true'

    - name: Create build directory
      run: mkdir build

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      run: cmake --build build --config Release

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Package with linuxdeploy (AppImage)
      run: |
        mkdir dist

        # Download linuxdeploy and the Qt plugin
        wget -c -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -c -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"

        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

        # Required to run AppImages on ubuntu-latest without FUSE installed
        export APPIMAGE_EXTRACT_AND_RUN=1

        # Use the install-qt-action step output to locate qmake
        export QMAKE="${{ steps.install-qt.outputs.qt-path }}/bin/qmake"
        export EXTRA_QT_PLUGINS=platforms

        # Create a desktop entry file (required by linuxdeploy)
        cat > WitechFTP.desktop << 'EOF'
        [Desktop Entry]
        Name=WitechFTP
        Exec=WitechFTP
        Icon=ftp-icon
        Type=Application
        Categories=Network;
        EOF

        # Bundle everything into an AppImage
        ./linuxdeploy-x86_64.AppImage --appdir dist -e build/WitechFTP -d WitechFTP.desktop -i src/ftp-icon.png --plugin qt --output appimage

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WitechFTP-Linux-AppImage
        path: "*.AppImage"